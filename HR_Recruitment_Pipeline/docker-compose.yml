version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hr_pipeline_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hr_pipeline}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_admin -d hr_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hr_pipeline_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hr_admin}:${POSTGRES_PASSWORD:-hr_secret}@db:5432/${POSTGRES_DB:-hr_pipeline}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CREDENTIALS_FILE: ${GOOGLE_CREDENTIALS_FILE:-credentials.json}
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
  backend_data:
    driver: local
